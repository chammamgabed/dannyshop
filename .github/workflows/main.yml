name: RDP Ubuntu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Update system
      run: sudo apt update

    - name: Install XFCE Desktop
      run: sudo apt install xfce4 xfce4-goodies -y

    - name: Install XRDP
      run: sudo apt install xrdp -y

    - name: Start XRDP
      run: sudo service xrdp start

    - name: Create user
      run: |
        sudo useradd -m user
        echo "user:123456" | sudo chpasswd
        sudo usermod -aG sudo user

    - name: Set XFCE session
      run: echo xfce4-session > ~/.xsession

    - name: Start tunnel
      run: ssh -o StrictHostKeyChecking=no -R 3389:localhost:3389 serveo.net
