name: RDP Ubuntu

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Update system
      run: sudo apt update

    - name: Install XRDP
      run: |
        sudo apt install xrdp -y
        sudo systemctl start xrdp

    - name: Set password
      run: echo "runner:123456" | sudo chpasswd

    - name: Install ngrok
      run: |
        wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-linux-amd64.zip
        unzip ngrok-stable-linux-amd64.zip
        chmod +x ngrok

    - name: Add token
      run: ./ngrok authtoken YOUR_NGROK_TOKEN

    - name: Start tunnel
      run: |
        ./ngrok tcp 3389 &
        sleep 10
        curl http://localhost:4040/api/tunnels

    - name: Keep alive
      run: sleep 6h
