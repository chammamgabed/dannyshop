name: RDP Ubuntu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Update system
      run: sudo apt update

    - name: Install XFCE & XRDP
      run: |
        sudo apt install xfce4 xfce4-goodies -y
        sudo apt install xrdp -y

    - name: Set XFCE session
      run: echo xfce4-session > ~/.xsession

    - name: Start XRDP
      run: sudo service xrdp start

    - name: Create user
      run: |
        sudo useradd -m user
        echo "user:1234" | sudo chpasswd
        sudo adduser user sudo

    - name: Install SSH client
      run: sudo apt install openssh-client -y

    - name: Start tunnel
      run: |
        echo "==== RDP READY ===="
        echo "Username: user"
        echo "Password: 1234"
        echo "==================="
        ssh -tt -o StrictHostKeyChecking=no -R 80:localhost:3389 localhost.run
